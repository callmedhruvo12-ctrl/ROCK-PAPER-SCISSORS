<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors - Ultimate Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Animated background particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        .game-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 900px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            font-size: 3em;
            font-weight: 800;
            letter-spacing: -1px;
            text-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            margin-bottom: 50px;
            gap: 20px;
        }

        .score-card {
            flex: 1;
            background: linear-gradient(135deg, #f6f8fb 0%, #e9ecf1 100%);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        .score-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .score-card.computer::before {
            background: linear-gradient(90deg, #f093fb, #f5576c);
        }

        .score-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .score-label {
            font-size: 0.95em;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .score-value {
            font-size: 3em;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score-card.computer .score-value {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .choices-container {
            margin-bottom: 50px;
        }

        .choices-label {
            text-align: center;
            font-size: 1.2em;
            color: #555;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .choices {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .choice {
            position: relative;
            background: white;
            border: 4px solid transparent;
            border-radius: 20px;
            width: 160px;
            height: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .choice::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 0;
        }

        .choice:hover::before {
            opacity: 1;
        }

        .choice:hover {
            transform: translateY(-15px) scale(1.05);
            border-color: #667eea;
            box-shadow: 0 20px 50px rgba(102, 126, 234, 0.4);
        }

        .choice:active {
            transform: translateY(-10px) scale(0.98);
        }

        .choice-emoji {
            font-size: 4.5em;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
            margin-bottom: 5px;
        }

        .choice:hover .choice-emoji {
            transform: scale(1.1);
            filter: drop-shadow(0 5px 15px rgba(255, 255, 255, 0.5));
        }

        .choice-name {
            font-size: 1em;
            font-weight: 600;
            color: #555;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .choice:hover .choice-name {
            color: white;
        }

        .result-area {
            text-align: center;
            min-height: 200px;
            margin-bottom: 30px;
            position: relative;
        }

        .waiting-message {
            font-size: 1.5em;
            color: #999;
            font-weight: 600;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .battle-stage {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 30px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .battle-choice {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .battle-emoji {
            font-size: 6em;
            animation: bounce 0.6s ease-out;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.2));
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .battle-label {
            font-size: 1.1em;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .vs-divider {
            font-size: 2.5em;
            font-weight: 800;
            color: #ddd;
            animation: rotate 1s ease-in-out;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg) scale(0.5); opacity: 0; }
            100% { transform: rotate(360deg) scale(1); opacity: 1; }
        }

        .result-message {
            font-size: 2em;
            font-weight: 800;
            padding: 25px 40px;
            border-radius: 20px;
            display: inline-block;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .win {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .lose {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .draw {
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
            color: #2d3436;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .reset-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .reset-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.4);
        }

        .reset-btn:active {
            transform: translateY(-1px);
        }

        /* Confetti animation for wins */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f0f;
            position: fixed;
            top: -10px;
            z-index: 1000;
            animation: confetti-fall 3s linear;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.2em;
            }

            .game-container {
                padding: 30px 20px;
            }

            .choice {
                width: 120px;
                height: 120px;
            }

            .choice-emoji {
                font-size: 3.5em;
            }

            .battle-emoji {
                font-size: 4em;
            }

            .result-message {
                font-size: 1.5em;
                padding: 20px 30px;
            }

            .choices {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="game-wrapper">
        <div class="game-container">
            <h1>⚔️ ROCK PAPER SCISSORS ⚔️</h1>
            <p class="subtitle">Choose your weapon wisely!</p>
            
            <div class="scoreboard">
                <div class="score-card player">
                    <div class="score-icon">👤</div>
                    <div class="score-label">You</div>
                    <div class="score-value" id="playerScore">0</div>
                </div>
                <div class="score-card computer">
                    <div class="score-icon">🤖</div>
                    <div class="score-label">Computer</div>
                    <div class="score-value" id="computerScore">0</div>
                </div>
            </div>

            <div class="choices-container">
                <div class="choices-label">⚡ Select Your Move ⚡</div>
                <div class="choices">
                    <div class="choice" onclick="playGame('rock')">
                        <div class="choice-emoji">🪨</div>
                        <div class="choice-name">Rock</div>
                    </div>
                    <div class="choice" onclick="playGame('paper')">
                        <div class="choice-emoji">📄</div>
                        <div class="choice-name">Paper</div>
                    </div>
                    <div class="choice" onclick="playGame('scissors')">
                        <div class="choice-emoji">✂️</div>
                        <div class="choice-name">Scissors</div>
                    </div>
                </div>
            </div>

            <div class="result-area" id="resultArea">
                <p class="waiting-message">🎯 Make your move to begin!</p>
            </div>

            <div class="controls">
                <button class="btn reset-btn" onclick="resetGame()">🔄 Reset Game</button>
            </div>
        </div>
    </div>

    <script>
        let playerScore = 0;
        let computerScore = 0;

        const choices = ['rock', 'paper', 'scissors'];
        const emojis = {
            rock: '🪨',
            paper: '📄',
            scissors: '✂️'
        };

        const names = {
            rock: 'Rock',
            paper: 'Paper',
            scissors: 'Scissors'
        };

        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        createParticles();

        function getComputerChoice() {
            return choices[Math.floor(Math.random() * choices.length)];
        }

        function determineWinner(player, computer) {
            if (player === computer) return 'draw';
            
            if (
                (player === 'rock' && computer === 'scissors') ||
                (player === 'paper' && computer === 'rock') ||
                (player === 'scissors' && computer === 'paper')
            ) {
                return 'win';
            }
            
            return 'lose';
        }

        function createConfetti() {
            const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#ffeaa7', '#fdcb6e'];
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDelay = Math.random() * 0.5 + 's';
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 3000);
                }, i * 30);
            }
        }

        function playGame(playerChoice) {
            const computerChoice = getComputerChoice();
            const result = determineWinner(playerChoice, computerChoice);

            // Update scores with animation
            if (result === 'win') {
                playerScore++;
                createConfetti();
            } else if (result === 'lose') {
                computerScore++;
            }

            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('computerScore').textContent = computerScore;

            // Show battle and result
            const resultArea = document.getElementById('resultArea');
            
            let resultMessage = '';
            let resultClass = '';
            
            if (result === 'win') {
                resultMessage = '🎉 VICTORY! 🎉';
                resultClass = 'win';
            } else if (result === 'lose') {
                resultMessage = '💔 DEFEAT! 💔';
                resultClass = 'lose';
            } else {
                resultMessage = '🤝 TIE GAME! 🤝';
                resultClass = 'draw';
            }

            resultArea.innerHTML = `
                <div class="battle-stage">
                    <div class="battle-choice">
                        <div class="battle-emoji">${emojis[playerChoice]}</div>
                        <div class="battle-label">You chose ${names[playerChoice]}</div>
                    </div>
                    <div class="vs-divider">⚡VS⚡</div>
                    <div class="battle-choice">
                        <div class="battle-emoji">${emojis[computerChoice]}</div>
                        <div class="battle-label">Computer chose ${names[computerChoice]}</div>
                    </div>
                </div>
                <div class="result-message ${resultClass}">${resultMessage}</div>
            `;
        }

        function resetGame() {
            playerScore = 0;
            computerScore = 0;
            document.getElementById('playerScore').textContent = 0;
            document.getElementById('computerScore').textContent = 0;
            document.getElementById('resultArea').innerHTML = '<p class="waiting-message">🎯 Make your move to begin!</p>';
        }
    </script>
</body>
</html>
